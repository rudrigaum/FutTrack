disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - redundant_nil_coalescing
  - sorted_imports
  - unused_import
  - vertical_whitespace_closing_braces

included:
  - FutTrack

excluded:
  - Carthage
  - Pods
  - DerivedData
  - .build

line_length:
  warning: 120
  error: 140

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 40
  error: 60

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - URL
    - x
    - y

force_cast: warning
force_try: warning

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 2

reporter: "xcode"
